<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>VVD CPA</title>

    <meta name="theme-color" content="#090B14">

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div id="app">

    <!-- ===================================== -->
    <!-- HEADER -->
    <!-- ===================================== -->

    <header id="header">

        <div class="logo">

            <img src="assets/logo.png" alt="VVD CPA">

        </div>

        <div class="title">

            <h1>VVD CPA</h1>

            <span>Premium Partner Network</span>

        </div>

        <div class="profile">

            <img id="userAvatar" src="assets/avatar.png">

        </div>

    </header>





    <!-- ===================================== -->
    <!-- MAIN -->
    <!-- ===================================== -->

    <main id="pages">




        <!-- ================= HOME ================= -->

        <section id="home" class="page active">

            <div id="profileCard"></div>

            <div id="balanceCard"></div>

            <div id="smartLinkCard"></div>

            <div id="offersSlider"></div>

            <div id="activityCard"></div>

        </section>




        <!-- ================= STATS ================= -->

        <section id="stats" class="page">

            <div id="statsHeader"></div>

            <div id="statsCards"></div>

            <div id="chart"></div>

            <div id="historyTable"></div>

        </section>




        <!-- ================= SMARTLINK ================= -->

        <section id="smartlink" class="page">

            <div id="smartlinkInfo"></div>

            <div id="smartlinkButton"></div>

            <div id="smartlinkHistory"></div>

        </section>





        <!-- ================= ДВИЖ ================= -->

        <section id="feed" class="page">

            <div id="feedHeader"></div>

            <div id="feedMessages"></div>

            <div id="feedInput"></div>

        </section>






        <!-- ================= SUPPORT ================= -->

        <section id="support" class="page">

            <div id="supportCard"></div>

            <div id="faq"></div>

            <div id="contacts"></div>

        </section>







        <!-- ================= ADMIN ================= -->

        <section id="admin" class="page">

            <div id="adminStats"></div>

            <div id="usersTable"></div>

            <div id="fraudTable"></div>

            <div id="withdrawTable"></div>

        </section>



    </main>






    <!-- ===================================== -->
    <!-- BOTTOM MENU -->
    <!-- ===================================== -->

    <nav id="bottomMenu">

        <button class="nav-btn active" data-page="home">

            <span>🏠</span>

            <small>Главная</small>

        </button>



        <button class="nav-btn" data-page="stats">

            <span>📊</span>

            <small>Статистика</small>

        </button>



        <button class="nav-btn" data-page="smartlink">

            <span>🔗</span>

            <small>SmartLink</small>

        </button>



        <button class="nav-btn" data-page="feed">

            <span>🔥</span>

            <small>Движ</small>

        </button>



        <button class="nav-btn" data-page="support">

            <span>💬</span>

            <small>Поддержка</small>

        </button>



        <button class="nav-btn" data-page="admin">

            <span>⚙</span>

            <small>Админ</small>

        </button>

    </nav>

</div>

<script src="app.js"></script>

</body>

</html>
