<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>VVD CPA</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div id="app">

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header id="header">

    <div class="header-left">

        <div class="avatar">

            <img
                id="userAvatar"
                src=""
                alt="Avatar">

        </div>

        <div class="user-info">

            <span class="welcome-text">
                Welcome back
            </span>

            <h2 id="userName">
                Loading...
            </h2>

            <small id="userId">
                ID: 000000000
            </small>

        </div>

    </div>

    <div class="header-right">

        <button class="notification-button">

            🔔

        </button>

    </div>

</header>

    <!-- ========================= -->
    <!-- MAIN -->
    <!-- ========================= -->

    <main>

        <!-- HOME -->

        <section id="homePage"
                 class="page active">
<!-- ========================= -->
<!-- PROFILE CARD -->
<!-- ========================= -->

<div class="profile-card">

    <div class="profile-top">

        <div class="profile-avatar">

            <img
                id="homeAvatar"
                src=""
                alt="Avatar">

        </div>

        <div class="profile-info">

            <h2 id="homeUserName">

                Loading...

            </h2>

            <span class="partner-badge">

                Партнёр

            </span>

            <div class="online-status">

                <span class="online-dot"></span>

                <span>

                    online

                </span>

            </div>

            <small id="homeUserId">

                ID: 000000000

            </small>

        </div>

    </div>

</div>
            <!-- ========================= -->
<!-- DASHBOARD -->
<!-- ========================= -->

<div class="dashboard-grid">

    <!-- Доступно -->

    <div class="dashboard-card">

        <span class="card-title">
            Доступно
        </span>

        <h3 id="balanceAvailable">
            $0.00
        </h3>

    </div>

    <!-- Hold -->

    <div class="dashboard-card">

        <span class="card-title">
            Hold
        </span>

        <h3 id="balanceHold">
            $0.00
        </h3>

    </div>

    <!-- Сегодня -->

    <div class="dashboard-card">

        <span class="card-title">
            Сегодня
        </span>

        <h3 id="todayProfit">
            $0.00
        </h3>

    </div>

    <!-- Выплачено -->

    <div class="dashboard-card">

        <span class="card-title">
            Выплачено
        </span>

        <h3 id="paidBalance">
            $0.00
        </h3>

    </div>

</div>
            <!-- ========================= -->
<!-- QUICK ACTIONS -->
<!-- ========================= -->

<div class="quick-actions">

    <button id="withdrawBtn"
            class="action-button">

        <span>💸</span>

        <span>

            Вывести

        </span>

    </button>

    <button id="historyBtn"
            class="action-button">

        <span>📜</span>

        <span>

            История

        </span>

    </button>

</div>
            <!-- ========================= -->
<!-- RECENT CONVERSIONS -->
<!-- ========================= -->

<div class="recent-conversions">

    <div class="section-header">

        <h3>

            Последние конверсии

        </h3>

        <button class="link-button">

            Смотреть все

        </button>

    </div>

    <div class="conversion-item">

        <div>

            <strong>Adult Dating</strong>

            <small>Smartlink</small>

        </div>

        <span class="conversion-profit">

            +$1.20

        </span>

    </div>

    <div class="conversion-item">

        <div>

            <strong>Mainstream Dating</strong>

            <small>Smartlink</small>

        </div>

        <span class="conversion-profit">

            +$0.95

        </span>

    </div>


</div>  
            <!-- ========================= -->
<!-- NEW OFFERS -->
<!-- ========================= -->

<div class="new-offers-card">

    <div class="new-offers-left">

        <span class="new-offers-icon">

            🔥

        </span>

        <div>

            <h3>

                Новые офферы

            </h3>

            <small>

                2 новых оффера доступны

            </small>

        </div>

    </div>

    <button
        id="newOffersBtn"
        class="open-button">

        Открыть

    </button>

</div>
        </section>

        <!-- OFFERS -->

        <section id="offersPage"
                 class="page">

        </section>

        <!-- STATISTICS -->

        <section id="statisticsPage"
                 class="page">

        </section>

        <!-- CHAT -->

        <section id="chatPage"
                 class="page">

        </section>

        <!-- PROFILE -->

        <section id="profilePage"
                 class="page">

        </section>

        <!-- ADMIN -->

        <section id="adminPage"
                 class="page">

        </section>

    </main>

    <!-- ========================= -->
    <!-- BOTTOM MENU -->
    <!-- ========================= -->

    <nav id="bottomMenu">

    </nav>

</div>

<script src="telegram.js"></script>
<script src="api.js"></script>
<script src="offers.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>

</html>
