<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VVD CPA — Premium CPA Network</title>
    <!-- Шрифты и Иконки -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org"></script>
    <!-- Стили -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Задний фон с неоновым свечением и размытыми пятнами -->
    <div class="bg-glow-container">
        <div class="glow-spot spot-1"></div>
        <div class="glow-spot spot-2"></div>
        <div class="bg-noise"></div>
    </div>

    <!-- Основной контейнер приложения -->
    <div id="app" class="app-container">
        
        <!-- Верхний брендированный бар -->
        <header class="app-header">
            <div class="brand">
                <span class="brand-logo">VVD CPA</span>
                <span class="badge-demo">DEMO VERSION</span>
            </div>
            <div class="header-status">
                <div class="status-indicator"></div>
                <span class="status-text">CPA Network</span>
            </div>
        </header>

        <!-- Контентная область (динамически переключаемые экраны) -->
        <main id="screen-container" class="screen-container">
            <!-- Экраны будут рендериться здесь через JS (app.js) -->
        </main>

        <!-- Нижнее премиальное меню (Bottom Menu) -->
        <nav class="bottom-menu">
            <button class="nav-item active" data-screen="main">
                <i data-lucide="home"></i>
                <span>Главная</span>
            </button>
            <button class="nav-item" data-screen="offers">
                <i data-lucide="layers"></i>
                <span>Офферы</span>
            </button>
            <button class="nav-item" data-screen="stats">
                <i data-lucide="bar-chart-3"></i>
                <span>Статистика</span>
            </button>
            <button class="nav-item" data-screen="chat">
                <i data-lucide="message-square"></i>
                <span>Чат</span>
            </button>
            <button class="nav-item" data-screen="profile">
                <i data-lucide="user"></i>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <!-- Скрипты -->
    <script src="telegram.js"></script>
    <script src="app.js"></script>
</body>
</html>
