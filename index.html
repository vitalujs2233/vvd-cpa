            font-family: 'Inter', sans-serif;

        body {

            color: var(--color-white);

            width: 100vw; height: 100vh;

        /* Задний фон по ТЗ */
        .bg-glow {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -2; pointer-events: none; opacity: 0.5;

        .spotlight-purple { width: 320px; height: 320px; background: var(--color-purple); top: -40px; left: -40px; }

        p { color: var(--color-gray); font-size: 13px; }

        .green-text { color: #1EEA7A !important; }
        .red-text { color: #FF4B6A !important; }
        .blue-text { color: #38BDF8 !important; }

        .purple-gradient-text {
            background: linear-gradient(135deg, #6E45FF, #9747FF, #C44DFF);

        }

        /* Страницы жестко изолированы */
        .page {
            display: none; flex-direction: column; height: calc(100vh - 84px); overflow-y: auto; padding: 20px 16px 120px 16px; width: 100%;
        }
