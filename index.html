<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VVD CPA — Premium Dark Luxury Dashboard</title>
    
    <!-- Шрифты Inter и Иконки Lucide Icons -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com"></script>
    
    <!-- Полная дизайн-система Premium Dark Luxury (ТЗ) -->
    <style>
        :root {
            --bg-main: #070A14;
            --bg-secondary: #0D1222;
            --bg-card: #101726;
            --bg-card-hover: #141C31;
            --accent-purple: #7B4DFF;
            --accent-purple-secondary: #A855F7;
            --accent-glow: rgba(123, 77, 255, 0.45);
            --color-green: #1EEA7A;
            --color-red: #FF4B6A;
            --color-white: #F8FAFF;
            --color-gray: #A5AEC5;
            --grad-primary: linear-gradient(135deg, #6E45FF, #9747FF, #C44DFF);
            --grad-glass: linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.015));
            --radius-card: 28px;
            --radius-btn: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #020409;
            color: var(--color-white);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Ограничивающий мобильный контейнер по центру экрана ПК */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--bg-main);
            min-height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.8);
            padding-bottom: 94px;
        }

        /* Задний фон: Размытые фиолетовые частицы и свечение */
        .bg-glow-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }
        .glow-spot {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
        }
        .spot-1 { top: -5%; right: -10%; width: 250px; height: 250px; background: var(--accent-purple); }
        .spot-2 { bottom: 15%; left: -10%; width: 300px; height: 300px; background: var(--accent-purple-secondary); }

        /* Шапка приложения */
        .app-header {
            height: 64px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(7, 10, 20, 0.85);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand-logo {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: var(--grad-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge-demo {
            font-size: 9px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 14px;
            background: rgba(123, 77, 255, 0.15);
            color: #9D6BFF;
            border: 1px solid rgba(123, 77, 255, 0.25);
        }

        /* Контентная зона */
        .screen-container {
            flex: 1;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Управление отображением экранов */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
            animation: screenIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Премиальные Glassmorphism 2.0 Карточки */
        .vvd-card {
            background: var(--grad-glass);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-card);
            padding: 22px;
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.55);
            margin-bottom: 16px;
            transition: transform 0.25s, background-color 0.25s;
        }
        .vvd-card:hover {
            background-color: var(--bg-card-hover);
            transform: translateY(-3px);
        }

        /* Поля ввода и кнопки */
        .vvd-input {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0 16px;
            color: #fff;
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .vvd-input:focus { border-color: var(--accent-purple); }

        .vvd-btn {
            width: 100%;
            height: 56px;
            border-radius: var(--radius-btn);
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            background: var(--grad-primary);
            box-shadow: 0 0 15px rgba(123,77,255,.45);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.25s;
        }
        .vvd-btn:hover { transform: scale(1.02) translateY(-2px); }

        /* Нижнее меню навигации фиксированное по центру */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            height: 84px;
            background: linear-gradient(180deg, rgba(16, 23, 38, 0.98), rgba(7, 10, 20, 1));
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
            padding-bottom: 8px;
        }
        .nav-item {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--color-gray);
            cursor: pointer;
            outline: none;
            width: 62px;
            font-family: inherit;
            transition: color 0.2s;
        }
        .nav-item.active { color: #9D6BFF; }

        @keyframes screenIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Бэкграунд -->
        <div class="bg-glow-container">
            <div class="glow-spot spot-1"></div>
            <div class="glow-spot spot-2"></div>
        </div>

        <!-- Шапка -->
        <header class="app-header">
            <div class="brand">
                <span class="brand-logo">VVD CPA</span>
                <span class="badge-demo">DEMO</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.04); padding: 6px 12px; border-radius: 20px;">
                <div style="width: 6px; height: 6px; background: var(--color-green); border-radius: 50%; box-shadow: 0 0 6px var(--color-green);"></div>
                <span style="font-size: 11px; color: var(--color-gray);">CPA Active</span>
            </div>
        </header>

        <!-- Основной стек всех 9 экранов макета -->
        <main class="screen-container" id="screens-root">
            
            <!-- ЭКРАН 1: ГЛАВНАЯ ПАНЕЛЬ -->
            <section id="screen-main" class="screen active">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                    <div style="width: 44px; height: 44px; border-radius: 50%; background: var(--grad-primary); display: flex; align-items: center; justify-content: center; font-weight: 700;">JD</div>
                    <div>
                        <div style="font-size: 12px; color: var(--color-gray);">Панель вебмастера</div>
                        <div style="font-size: 16px; font-weight: 600;">John Doe</div>
                    </div>
                </div>

                <div class="vvd-card">
                    <div style="font-size: 12px; color: var(--color-gray); text-transform: uppercase; margin-bottom: 4px;">Текущий баланс</div>
                    <div style="font-size: 34px; font-weight: 700; margin-bottom: 16px;">$154.50</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 14px;">
                        <div>
                            <span style="font-size: 11px; color: var(--color-gray); display: block;">Hold</span>
                            <span style="font-size: 15px; font-weight: 700; color: #FFB800;">$32.40</span>
                        </div>
                        <div>
                            <span style="font-size: 11px; color: var(--color-gray); display: block;">Заработано</span>
                            <span style="font-size: 15px; font-weight: 700; color: var(--color-green);">$1,234.50</span>
                        </div>
