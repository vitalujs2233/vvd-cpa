<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VVD CPA</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <header>

        <h1>VVD CPA</h1>

        <p>Dating CPA Network</p>

    </header>

    <section class="balance">

        <div class="card">

            <h3>💰 Доступно</h3>

            <span>$0.00</span>

        </div>

        <div class="card">

            <h3>⏳ В холде</h3>

            <span>$0.00</span>

        </div>

    </section>

    <button class="withdraw">

        Вывести средства

    </button>

    <section class="offer">

        <h2>🔥 Dating CPA</h2>

        <p>Traforce SmartLink</p>

        <button>

            Получить ссылку

        </button>

    </section>

    <section class="stats">

        <div>

            <strong>Клики</strong>

            <p>0</p>

        </div>

        <div>

            <strong>Лиды</strong>

            <p>0</p>

        </div>

        <div>

            <strong>CR</strong>

            <p>0%</p>

        </div>

        <div>

            <strong>Доход</strong>

            <p>$0.00</p>

        </div>

    </section>

    <nav>

        <button>🏠</button>

        <button>🔗</button>

        <button>📊</button>

        <button>💬</button>

        <button>👤</button>

    </nav>

</div>

<script src="app.js"></script>

</body>
</html>
