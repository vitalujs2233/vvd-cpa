<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>VVD CPA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

</head>

<body>

<div id="app">

<header class="top-header">

<div class="profile">

<div class="avatar">
<img id="userAvatar" src="" alt="">
</div>

<div class="profile-info">

<h2 id="username">
Loading...
</h2>

<p id="userid">
ID:
</p>

</div>

</div>

<div class="online-dot"></div>

</header>

<main>

<section id="homePage" class="page active">

<div class="stats-grid">

<div class="stat-card">

<span class="stat-title">
Available
</span>

<h3 id="balanceAvailable">
$0.00
</h3>

</div>

<div class="stat-card">

<span class="stat-title">
Hold
</span>

<h3 id="balanceHold">
$0.00
</h3>

</div>

<div class="stat-card">

<span class="stat-title">
Today
</span>

<h3 id="todayIncome">
$0.00
</h3>

</div>

<div class="stat-card">

<span class="stat-title">
Paid
</span>

<h3 id="paidBalance">
$0.00
</h3>

</div>

</div>

<div class="action-grid">

<button class="action-card" id="withdrawButton">

<div class="action-icon">

💳

</div>

<span>

Withdraw

</span>

</button>

<button class="action-card" id="historyButton">

<div class="action-icon">

📜

</div>

<span>

History

</span>

</button>

</div>

<section class="section-title">

🔥 Featured Offers

</section>

<div id="offersContainer">

</div>

</section>
<section id="offersPage" class="page">

    <div class="page-header">
        <h2>🔥 Offers</h2>
        <p>Top converting campaigns</p>
    </div>

    <div id="offersList">

    </div>

</section>


<section id="chatPage" class="page">

    <div class="page-header">
        <h2>💬 Движ</h2>
        <p>Внутренний чат партнеров</p>
    </div>

    <div class="chat-placeholder">

        <div class="chat-icon">
            💬
        </div>

        <h3>Скоро</h3>

        <p>
            Здесь появится внутренний чат партнеров VVD CPA.
        </p>

    </div>

</section>


<section id="profilePage" class="page">

    <div class="page-header">
        <h2>👤 Профиль</h2>
    </div>

    <div class="profile-card">

        <div class="profile-avatar">

            <img id="profileAvatar" src="" alt="">

        </div>

        <h2 id="profileName">
            Loading...
        </h2>

        <span id="profileId">
            ID:
        </span>

    </div>

</section>


<section id="adminPage" class="page admin-only">

    <div class="page-header">

        <h2>⚙️ Admin Panel</h2>

    </div>

    <div class="admin-grid">

        <button class="admin-card">
            👥
            <span>Users</span>
        </button>

        <button class="admin-card">
            🎁
            <span>Offers</span>
        </button>

        <button class="admin-card">
            💸
            <span>Payouts</span>
        </button>

        <button class="admin-card">
            📢
            <span>Broadcast</span>
        </button>

    </div>

</section>

</main>


<nav class="bottom-nav">

<button class="nav-button active" data-page="homePage">

<div>🏠</div>

<small>Home</small>

</button>

<button class="nav-button" data-page="offersPage">

<div>🎯</div>

<small>Offers</small>

</button>

<button class="nav-button" data-page="chatPage">

<div>💬</div>

<small>Chat</small>

</button>

<button class="nav-button" data-page="profilePage">

<div>👤</div>

<small>Profile</small>

</button>

<button
class="nav-button admin-only"
data-page="adminPage">

<div>⚙️</div>

<small>Admin</small>

</button>

</nav>

</div>

<script src="telegram.js"></script>
<script src="api.js"></script>
<script src="offers.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

</body>
</html>
